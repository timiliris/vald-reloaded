<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Ambient floating embers -->
    <div class="ember-canvas">
      <div class="ember"></div>
      <div class="ember"></div>
      <div class="ember"></div>
      <div class="ember"></div>
      <div class="ember"></div>
      <div class="ember"></div>
      <div class="ember"></div>
      <div class="ember"></div>
    </div>
    <div class="heat-haze"></div>

    <header>
      <div class="header-left">
        <img src="icons/icon48.png" alt="V" class="logo">
        <h1>VALD <span class="red">RELOADED</span></h1>
      </div>
      <div class="header-right">
        <button id="refreshBtn" class="icon-btn" title="Rafraichir">
          <svg id="refreshIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
        <button id="settingsBtn" class="icon-btn" title="Parametres">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Tabs -->
    <nav class="tabs tab-1" id="tabNav">
      <button class="tab active" data-tab="status">Live</button>
      <button class="tab" data-tab="history">Historique</button>
      <button class="tab" data-tab="clips">Clips</button>
      <button class="tab" data-tab="socials">Reseaux</button>
    </nav>

    <!-- TAB: Status -->
    <div id="tab-status" class="tab-content active">
      <div id="offline" class="state" style="display:none;">
        <div class="status-card offline-card">
          <!-- Extinguished flame art -->
          <svg class="offline-art" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M32 4C32 4 18 22 18 38C18 46.8 24.3 54 32 56C39.7 54 46 46.8 46 38C46 22 32 4 32 4Z" stroke="#3a3a3a" stroke-width="1.5" fill="none" opacity="0.6"/>
            <path d="M32 18C32 18 24 30 24 38C24 42.4 27.6 46 32 46C36.4 46 40 42.4 40 38C40 30 32 18 32 18Z" stroke="#2a2a2a" stroke-width="1" fill="none" opacity="0.4"/>
            <line x1="26" y1="50" x2="38" y2="50" stroke="#3a3a3a" stroke-width="1" opacity="0.3"/>
            <line x1="28" y1="54" x2="36" y2="54" stroke="#3a3a3a" stroke-width="1" opacity="0.2"/>
          </svg>
          <div class="status-badge offline-badge">OFFLINE</div>
          <p class="status-text">Vald n'est pas en live pour le moment.</p>
          <div class="last-check" id="offlineLastCheck"></div>
        </div>
      </div>

      <div id="live" class="state" style="display:none;">
        <div class="status-card live-card">
          <div class="thumbnail-wrap">
            <img id="streamThumbnail" class="thumbnail" alt="Stream">
            <div class="live-indicator">
              <span class="pulse-dot"></span> LIVE
            </div>
            <div class="viewer-count" id="viewerCount"></div>
          </div>
          <div class="stream-info">
            <h2 id="streamTitle" class="stream-title"></h2>
            <p id="streamGame" class="stream-game"></p>
            <p id="streamUptime" class="stream-uptime"></p>
          </div>
          <a class="btn-primary btn-watch" href="https://twitch.tv/vald" target="_blank">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Regarder le live
          </a>
        </div>
      </div>

      <div id="error" class="state" style="display:none;">
        <div class="message-box error-box">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <p id="errorText"></p>
          <button id="retryBtn" class="btn-primary">Reessayer</button>
        </div>
      </div>
    </div>

    <!-- TAB: History -->
    <div id="tab-history" class="tab-content">
      <div id="historyList" class="scroll-list">
        <div class="loading-spinner">
          <div class="spinner-ring"></div>
          <span>Chargement...</span>
        </div>
      </div>
    </div>

    <!-- TAB: Clips -->
    <div id="tab-clips" class="tab-content">
      <div id="clipsList" class="scroll-list">
        <div class="loading-spinner">
          <div class="spinner-ring"></div>
          <span>Chargement...</span>
        </div>
      </div>
    </div>

    <!-- TAB: Socials -->
    <div id="tab-socials" class="tab-content">
      <div class="socials-list">
        <a href="https://www.twitch.tv/vald" target="_blank" rel="noopener noreferrer" class="social-item twitch">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
          <div class="social-info">
            <span class="social-name">Twitch</span>
            <span class="social-handle">twitch.tv/vald</span>
          </div>
        </a>
        <a href="https://youtube.com/@vald_vald" target="_blank" rel="noopener noreferrer" class="social-item youtube">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12z"/></svg>
          <div class="social-info">
            <span class="social-name">YouTube</span>
            <span class="social-handle">@vald_vald</span>
          </div>
        </a>
        <a href="https://www.instagram.com/valdsullyvan/" target="_blank" rel="noopener noreferrer" class="social-item instagram">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
          <div class="social-info">
            <span class="social-name">Instagram</span>
            <span class="social-handle">@valdsullyvan</span>
          </div>
        </a>
        <a href="https://x.com/vald_ld" target="_blank" rel="noopener noreferrer" class="social-item x-twitter">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          <div class="social-info">
            <span class="social-name">X</span>
            <span class="social-handle">@vald_ld</span>
          </div>
        </a>
        <a href="https://open.spotify.com/artist/2FKWlFOHbfGvqnOUPGeLuh" target="_blank" rel="noopener noreferrer" class="social-item spotify">

          <div class="social-info">
            <span class="social-name">Spotify</span>
            <span class="social-handle">Vald</span>
          </div>
        </a>
        <a href="https://music.apple.com/fr/artist/vald/1065517051" target="_blank" rel="noopener noreferrer" class="social-item apple-music">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M23.994 6.124a9.23 9.23 0 0 0-.24-2.19c-.317-1.31-1.062-2.31-2.18-3.043A5.022 5.022 0 0 0 19.92.28a10.56 10.56 0 0 0-1.745-.172C17.476.06 16.778.04 14.71.02c-.674-.01-1.347-.01-2.02 0C10.622.04 9.924.06 9.225.108 8.408.16 7.597.26 6.82.497 5.564.847 4.546 1.517 3.774 2.544 3.26 3.213 2.924 3.972 2.744 4.8c-.178.824-.24 1.66-.24 2.5v9.398c0 .842.06 1.678.24 2.502.18.83.516 1.59 1.03 2.258.772 1.028 1.79 1.698 3.046 2.048.78.24 1.59.338 2.408.39.7.048 1.398.068 2.097.088.674.01 1.347.01 2.02 0 2.068-.02 2.766-.04 3.465-.088.812-.052 1.618-.15 2.4-.39 1.254-.35 2.272-1.02 3.044-2.048a5.024 5.024 0 0 0 1.032-2.258c.178-.824.24-1.66.24-2.502V6.124zm-6.635 8.776c0 1.044-.072 2.086-.402 3.09-.266.82-.712 1.51-1.454 1.97-.474.296-1 .436-1.554.436-.384 0-.766-.072-1.126-.234-.724-.326-1.14-.884-1.336-1.648-.126-.494-.14-1-.14-1.508V9.572c0-.398.014-.796.072-1.19.114-.764.478-1.378 1.13-1.804.442-.29.93-.418 1.446-.42.376 0 .746.06 1.098.21.762.322 1.202.894 1.4 1.686.124.494.136.998.136 1.506v4.54z"/></svg>
          <div class="social-info">
            <span class="social-name">Apple Music</span>
            <span class="social-handle">Vald</span>
          </div>
        </a>
        <a href="https://youtube.com/@valdstream" target="_blank" rel="noopener noreferrer" class="social-item youtube">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12z"/></svg>
          <div class="social-info">
            <span class="social-name">YT Stream</span>
            <span class="social-handle">@valdstream</span>
          </div>
        </a>
        <a href="https://www.facebook.com/VALDNQNT" target="_blank" rel="noopener noreferrer" class="social-item facebook">

      </div>
    </div>
